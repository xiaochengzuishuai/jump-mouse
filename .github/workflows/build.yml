name: Build and Release

on:
  push:
    branches: [master]
    tags: ["v*"]
  workflow_dispatch:

jobs:
  build:
    runs-on: windows-latest

    steps:
      - uses: actions/checkout@v4

      - name: Configure CMake
        run: cmake -B build -S . -A x64

      - name: Build
        run: cmake --build build --config Release --parallel

      - name: Package release
        run: cmake --build build --config Release --target release

      - name: Create zip
        shell: pwsh
        run: |
          $tag = "${{ github.ref_name }}"
          Compress-Archive -Path build/release/* -DestinationPath "JumpMouse-$tag-x64.zip"

      - name: Upload zip
        uses: actions/upload-artifact@v4
        with:
          name: JumpMouse-${{ github.ref_name }}-x64
          path: JumpMouse-${{ github.ref_name }}-x64.zip

  release:
    if: startsWith(github.ref, 'refs/tags/v')
    needs: build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/download-artifact@v4
        with:
          name: JumpMouse-${{ github.ref_name }}-x64

      - name: Create Release
        uses: softprops/action-gh-release@v2
        with:
          name: "Jump Mouse ${{ github.ref_name }}"
          body: |
            ## Jump Mouse — ${{ github.ref_name }}

            稳定版。Alt+Tab 窗口切换时，鼠标自动跳转到新窗口中心。

            ### 包含文件
            - `jump_mouse_daemon.exe` — 后台守护进程
            - `jump_mouse_config.exe` — GUI 配置工具
            - `config.json` — 默认配置

            ### 使用方法
            1. 将所有文件放到同一目录
            2. 运行 `jump_mouse_config.exe` 打开设置
            3. 点击「启动」开启服务
            4. Alt+Tab 切换窗口，鼠标自动跟随

            ### 系统要求
            - Windows 10/11 64-bit
            - 无需安装任何运行时（静态链接）
          files: JumpMouse-${{ github.ref_name }}-x64.zip
          draft: false
          prerelease: false
